{{ $num := .Get "num" }}
{{ $cap := .Get "caption" }}
{{ $id := printf "tab-%s" ($num | urlize) }}

<figure id="{{ $id }}" class="hugo-table-figure">
  <div class="hugo-table-wrapper">
    {{ .Inner | markdownify }}
  </div>
  <figcaption class="hugo-table-caption">
    <strong>{{ i18n "shortcode.table" }} {{ $num }}:</strong> {{ $cap }}
  </figcaption>
</figure>
