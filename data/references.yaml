- id: mastrogiorgioMoreThumbsRules2022
  abstract: >-
    The literatures on bounded and ecological rationality are built on
    adaptationism—and its associated modular, cognitivist and computational
    paradigm—that does not address or explain the evolutionary origins of
    rationality. We argue that the adaptive mechanisms of evolution are not
    sufﬁcient for explaining human rationality, and we posit that human
    rationality presents exaptive origins, where exaptations are traits evolved
    for other functions or no function at all, and later co-opted for new uses.
    We propose an embodied reconceptualization of rationality—embodied
    rationality—based on the reuse of the perception-action system, where many
    neural processes involved in the control of the sensory-motor system,
    salient in ancestral environments have been later co-opted to create—by
    tinkering—high-level reasoning processes, employed in civilized niches.
  accessed:
