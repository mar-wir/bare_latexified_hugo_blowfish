- id: smith-jentschGuidedTeamSelfCorrection2008
  abstract: >-
    This research investigated the effects of guided team self-correction using
    an empirically derived expert model of teamwork as the organizing framework.
    First, the authors describe the process used to define this model. Second,
    they report findings from two studies in which the expert model was used to
    structure the process of guided team self-correction. Participants were U.S.
    Navy command and control teams (25 in Study 1, 13 in Study 2). Results
    indicated that teams debriefed using the expert model-driven guided team
    self-correction approach developed more accurate mental models of teamwork
    (Study 1) and demonstrated greater teamwork processes and more effective
    outcomes (Study 2) than did teams debriefed using a less participative and
    chronologically organized approach that is more typical for these teams.
