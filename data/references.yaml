- id: dejaegherParticipatorySensemakingEnactive2007
  abstract: >-
    As yet, there is no enactive account of social cognition. This paper extends
    the enactive concept of sense-making into the social domain. It takes as its
    departure point the process of interaction between individuals in a social
    encounter. It is a well-established finding that individuals can and
    generally do coordinate their movements and utterances in such situations.
    We argue that the interaction process can take on a form of autonomy. This
    allows us to reframe the problem of social cognition as that of how meaning
    is generated and transformed in the interplay between the unfolding
    interaction process and the individuals engaged in it. The notion of
    sense-making in this realm becomes participatory sense-making. The onus of
    social understanding thus moves away from strictly the individual only.
