- id: duynebarensteinHowAccessibleAffordable2020
  abstract: >-
    In a global context characterised by governmental withdrawal from the
    housing sector, the commodification of housing, and the inability of the
    private sector to cater to the needs of low-income people, housing
    cooperatives are being rediscovered as a third way in the provision of
    affordable housing. Housing cooperatives in Switzerland emerged towards the
    end of the 19th century as bottom-up organisations in a context of rapid
    industrialisation and urbanisation characterised by acute housing shortages.
    Poor housing conditions and excessive rents threatened public health and
    social order, thus forcing municipal governments to respond to this crisis
    in an intellectual and political context that was shaped by the growth of
    the international labour organisations. Historically and geographically, the
    formation of housing cooperatives has been highly uneven and largely
    concentrated in urban areas. In fact, their emergence was contingent upon
    local political initiatives that forced municipal governments to intervene
    in the housing sector. Housing cooperatives thus became key partners in the
    implementation of social housing policies that made it possible for the
    state to engage only marginally in the provision of affordable housing. As
    opposed to other European countries where neoliberal reforms led to a
    gradual commodification of cooperative housing this is not the case of
    Switzerland, where housing owned by cooperatives remains permanently
    withdrawn from speculation. But are housing cooperatives in a position to
    respond to the growing need of affordable housing? How affordable are
    housing cooperatives in comparison to housing provided by the private rental
    market? How accessible are housing cooperatives to those most in need? And
    how protected are housing cooperatives from commodification risks?
