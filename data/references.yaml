- id: camuffoScientificApproachEntrepreneurial2024
  abstract: >-
    Research Summary: This article runs a large-scale replication of Camuffo and
    colleagues in 2020, involving 759 firms in four randomized control trials.
    The larger sample generates novel and more precise insights about the
    teachability and implications of a scientific approach in entrepreneurship.
    We observe a positive impact on idea termination and results that are
    consistent with a nonlinear effect on radical pivots, with treated firms
    running few over no or repeated pivots. We provide a theoretical
    interpretation of the empirical results: the scientific approach enhances
    entrepreneurs' efficiency in searching for viable ideas and raises their
    methodic doubt because, like scientists, they realize that there may be
    alternative scenarios from the ones that they theorize.
