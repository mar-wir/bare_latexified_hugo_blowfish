- id: flemingHowMeasureMetacognition2014
  abstract: >-
    The ability to recognize one’s own successful cognitive processing, in e.g.,
    perceptual or memory tasks, is often referred to as metacognition. How
    should we quantitatively measure such ability? Here we focus on a class of
    measures that assess the correspondence between trial-by-trial accuracy and
    one’s own conﬁdence. In general, for healthy subjects endowed with
    metacognitive sensitivity, when one is conﬁdent, one is more likely to be
    correct. Thus, the degree of association between accuracy and conﬁdence can
    be taken as a quantitative measure of metacognition. However, many studies
    use a statistical correlation coefﬁcient (e.g., Pearson’s r) or its variant
    to assess this degree of association, and such measures are susceptible to
    undesirable inﬂuences from factors such as response biases. Here we review
    other measures based on signal detection theory and receiver operating
    characteristics (ROC) analysis that are “bias free,” and relate these
    quantities to the calibration and discrimination measures developed in the
    probability estimation literature. We go on to distinguish between the
    related concepts of metacognitive bias (a difference in subjective conﬁdence
    despite basic task performance remaining constant), metacognitive
    sensitivity (how good one is at distinguishing between one’s own correct and
    incorrect judgments) and metacognitive efﬁciency (a subject’s level of
    metacognitive sensitivity given a certain level of task performance).
    Finally, we discuss how these three concepts pose interesting questions for
    the study of metacognition and conscious awareness.
