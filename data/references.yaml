- id: duynebarensteinServiceProvidersCivil2020
  abstract: >-
    This paper provides an overview of the role of housing cooperatives and
    their associations in the Swiss housing system. Our research indicates that
    housing cooperatives that historically emerged from working class movements
    over the years became primarily concerned with maintaining the housing stock
    of their members. While showing a high degree of internal solidarity towards
    members, they hardly engaged in acts of external solidarity. We thus shift
    our focus on housing cooperatives’ associations (CHAs) by interviewing the
    board members of five regional and one national CHA. Our findings show that
    when it comes to engage in acts of external solidarity, CHAs must cope with
    external and internal pressures and mediate between the logics of membership
    and of influence. We describe the dilemmas with whom CHAs are confronted and
    their coping strategies. We argue that to remain politically relevant and
    contribute to tackling the current housing crisis, CHAs need to focus on
    housing politics as much as on housing policy.
